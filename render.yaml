databases:
  - name: unitap-db
    plan: free

services:
  - type: web
    name: unitap-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: unitap-db
          property: connectionString
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
